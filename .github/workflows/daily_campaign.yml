name: Daily Campaign

# Re-enabled 2026-06-15. Preconditions met: DKIM+DMARC verified on
# emtdstudio.com, SK pipeline live (OSM discovery + v2 grounded emails +
# email validation), volume kept low (--email-limit 15) for a gentle ramp.
# Weekend sends are auto-skipped by the campaign's send-window guard.
on:
  schedule:
    - cron: '0 9 * * 1-5'   # 11:00 Bratislava, Mon–Fri — Tomas
    - cron: '0 12 * * 1-5'  # 14:00 Bratislava, Mon–Fri — Erik
    - cron: '0 15 * * 1-5'  # 17:00 Bratislava, Mon–Fri — Michal
  workflow_dispatch:
    inputs:
      sender:
        description: 'Which sender to use'
        type: choice
        options:
          - tomas
          - erik
          - michal
        default: tomas
      reset:
        description: 'Reset progress and start from scratch'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (preview emails, do not send)'
        type: boolean
        default: false

jobs:
  campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Figure out which sender based on schedule or manual input
      - name: Determine sender
        id: sender
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.sender }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            echo "Current UTC hour: $HOUR"
            # Use ranges to handle GitHub Actions cron delays (up to 15 min)
            if [ "$HOUR" -ge 9 ] && [ "$HOUR" -lt 12 ]; then
              echo "name=tomas" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 15 ]; then
              echo "name=erik" >> $GITHUB_OUTPUT
            else
              echo "name=michal" >> $GITHUB_OUTPUT
            fi
          fi

      # Create .env with the right sender's credentials
      # Shared: ANTHROPIC_API_KEY, PAGESPEED_API_KEY, SERPER_API_KEY
      # Per-sender: SMTP_HOST, SMTP_PORT, SMTP_EMAIL, SMTP_PASSWORD
      - name: Check sender credentials exist
        id: check
        run: |
          SENDER="${{ steps.sender.outputs.name }}"
          if [ "$SENDER" = "erik" ] && [ -z "${{ secrets.SMTP_EMAIL_2 }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Erik not configured — skipping this run"
          elif [ "$SENDER" = "michal" ] && [ -z "${{ secrets.SMTP_EMAIL_3 }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Michal not configured — skipping this run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create .env for sender
        if: steps.check.outputs.skip != 'true'
        run: |
          SENDER="${{ steps.sender.outputs.name }}"
          echo "Using sender: $SENDER"

          # Base config (shared by all senders)
          cat > .env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}
          LLM_MODEL=claude-sonnet-4-6
          SEND_DELAY_SECONDS=30
          PAGESPEED_DELAY_SECONDS=2
          SCRAPE_DELAY_SECONDS=1
          OUTPUT_DIR=output
          EOF

          # Shared defaults (same for everyone unless overridden)
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env

          # Per-sender: email, password, and optionally their own Serper key
          if [ "$SENDER" = "erik" ]; then
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY_2 }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL_2 }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD_2 }}" >> .env
          elif [ "$SENDER" = "michal" ]; then
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY_3 }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL_3 }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD_3 }}" >> .env
          else
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          fi

      # Ensure output dir exists so uploads never fail on missing files
      - name: Ensure output directory
        if: steps.check.outputs.skip != 'true'
        run: mkdir -p output

      # Download shared progress and sent registry
      - name: Download previous progress
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: campaign-progress
          path: output/
        continue-on-error: true

      - name: Download sent registry
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: sent-registry
          path: output/
        continue-on-error: true

      - name: Run campaign
        if: steps.check.outputs.skip != 'true'
        run: |
          SENDER="${{ steps.sender.outputs.name }}"

          SEND_FLAG="--send --confirm-send"
          RESET_FLAG=""
          SENDER_ARG=""
          SENDER_FULL_ARG=""

          if [ "$SENDER" = "erik" ]; then
            SENDER_ARG="Erik"
            SENDER_FULL_ARG="Erik Pitorak"
          elif [ "$SENDER" = "michal" ]; then
            SENDER_ARG="Michal"
            SENDER_FULL_ARG="Michal Pipa"
          fi

          if [ "${{ inputs.reset }}" = "true" ]; then
            RESET_FLAG="--reset"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            SEND_FLAG=""
          fi

          # Gentle ramp: cap emails/day/sender low while reputation builds.
          # Raise --email-limit once replies look healthy. v2 + sk are the
          # campaign defaults; OSM is the primary discovery source.
          RAMP="--email-limit 15"

          if [ -n "$SENDER_ARG" ]; then
            python -m waa campaign $SEND_FLAG $RESET_FLAG $RAMP --sender "$SENDER_ARG" --sender-full "$SENDER_FULL_ARG"
          else
            python -m waa campaign $SEND_FLAG $RESET_FLAG $RAMP
          fi
        timeout-minutes: 90

      # Upload shared files — all senders read/write the same ones
      - name: Upload progress
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: campaign-progress
          path: output/campaign_progress.json
          overwrite: true
          if-no-files-found: warn

      - name: Upload sent registry
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: sent-registry
          path: output/sent_registry.json
          overwrite: true
          if-no-files-found: warn

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: campaign-results-${{ steps.sender.outputs.name }}-${{ github.run_number }}
          path: |
            output/*.json
            output/*.csv
          retention-days: 30
          if-no-files-found: warn
