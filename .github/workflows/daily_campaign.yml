name: Daily Campaign

# Runs 3 times a day — one sender per run
# 9:00 UTC (11:00 Bratislava) = Tomas
# 12:00 UTC (14:00 Bratislava) = Sender 2
# 15:00 UTC (17:00 Bratislava) = Sender 3
on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      sender:
        description: 'Which sender to use'
        type: choice
        options:
          - tomas
          - sender2
          - sender3
        default: tomas
      reset:
        description: 'Reset progress and start from scratch'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (preview emails, do not send)'
        type: boolean
        default: false

jobs:
  campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Figure out which sender based on schedule or manual input
      - name: Determine sender
        id: sender
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.sender }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "09" ]; then
              echo "name=tomas" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "12" ]; then
              echo "name=sender2" >> $GITHUB_OUTPUT
            else
              echo "name=sender3" >> $GITHUB_OUTPUT
            fi
          fi

      # Create .env with the right sender's credentials
      # Shared: ANTHROPIC_API_KEY, PAGESPEED_API_KEY, SERPER_API_KEY
      # Per-sender: SMTP_HOST, SMTP_PORT, SMTP_EMAIL, SMTP_PASSWORD
      - name: Check sender credentials exist
        id: check
        run: |
          SENDER="${{ steps.sender.outputs.name }}"
          if [ "$SENDER" = "sender2" ] && [ -z "${{ secrets.SMTP_EMAIL_2 }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Sender2 not configured — skipping this run"
          elif [ "$SENDER" = "sender3" ] && [ -z "${{ secrets.SMTP_EMAIL_3 }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Sender3 not configured — skipping this run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create .env for sender
        if: steps.check.outputs.skip != 'true'
        run: |
          SENDER="${{ steps.sender.outputs.name }}"
          echo "Using sender: $SENDER"

          # Base config (shared by all senders)
          cat > .env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}
          LLM_MODEL=claude-sonnet-4-6
          SEND_DELAY_SECONDS=30
          PAGESPEED_DELAY_SECONDS=2
          SCRAPE_DELAY_SECONDS=1
          OUTPUT_DIR=output
          EOF

          # Per-sender overrides
          if [ "$SENDER" = "sender2" ]; then
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY_2 }}" >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST_2 }}" >> .env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT_2 }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL_2 }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD_2 }}" >> .env
          elif [ "$SENDER" = "sender3" ]; then
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY_3 }}" >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST_3 }}" >> .env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT_3 }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL_3 }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD_3 }}" >> .env
          else
            echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
            echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}" >> .env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          fi

      # Download shared progress and sent registry
      - name: Download previous progress
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: campaign-progress
          path: output/
        continue-on-error: true

      - name: Download sent registry
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: sent-registry
          path: output/
        continue-on-error: true

      - name: Run campaign
        if: steps.check.outputs.skip != 'true'
        run: |
          SENDER="${{ steps.sender.outputs.name }}"

          SEND_FLAG="--send --confirm-send"
          RESET_FLAG=""
          SENDER_ARG=""
          SENDER_FULL_ARG=""

          if [ "$SENDER" = "sender2" ]; then
            SENDER_ARG="Erik"
            SENDER_FULL_ARG="Erik Pitorak"
          elif [ "$SENDER" = "sender3" ]; then
            SENDER_ARG="Sender3"
            SENDER_FULL_ARG="Sender Three"
          fi

          if [ "${{ inputs.reset }}" = "true" ]; then
            RESET_FLAG="--reset"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            SEND_FLAG=""
          fi

          if [ -n "$SENDER_ARG" ]; then
            python audit_agent.py campaign $SEND_FLAG $RESET_FLAG --sender "$SENDER_ARG" --sender-full "$SENDER_FULL_ARG"
          else
            python audit_agent.py campaign $SEND_FLAG $RESET_FLAG
          fi
        timeout-minutes: 90

      # Upload shared files — all senders read/write the same ones
      - name: Upload progress
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: campaign-progress
          path: output/campaign_progress.json
          overwrite: true

      - name: Upload sent registry
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: sent-registry
          path: output/sent_registry.json
          overwrite: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.skip != 'true'
        with:
          name: campaign-results-${{ steps.sender.outputs.name }}-${{ github.run_number }}
          path: |
            output/*.json
            output/*.csv
          retention-days: 30
